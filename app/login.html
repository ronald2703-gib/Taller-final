<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aves Hermosas de Colombia</title>
    <link rel="shortcut icon" href="../assets/img/icone-twitter-verte.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="text-light-emphasis d-flex align-items-center vh-100 " 
      style="background-image: url('../assets/img/Gemini_Generated_Image_l52zpxl52zpxl52z.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">


<main class="container">
        <div class="row justify-content-center">
            <div class="col-10 col-sm-8 col-md-6 col-lg-4">
                <div class="text-center mb-4">
                    <a href="../index.html" class="text-decoration-none text-white fs-3 fw-bold">
                        <i class="bi bi-twitter text-success bt p-1 t rounded bg-gradient "></i> Alas de Colombia
                    </a> 
                </div>
               
                <div class="card border-success border-opacity-25 shadow-lg" 
                     style="background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center text-white fw-bold fs-4 mb-4">Ingreso a la Plataforma</h2>
                        
                        <form action="cliente.html" method="GET">
                        
                          
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control text-white border-secondary border-opacity-50" 
                                       style="background: rgba(0, 0, 0, 0.45);" id="floatingEmail" placeholder="name@example.com" required>
                                <label for="floatingEmail" class="text-white-50">Correo electrónico</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control text-white border-secondary border-opacity-50" 
                                       style="background: rgba(0, 0, 0, 0.45);" id="floatingPassword" placeholder="Contraseña" required>
                                <label for="floatingPassword" class="text-white-50">Contraseña</label>
                            </div>

                            <div class="form-check mb-3 d-flex align-items-center gap-2">
                                <input class="form-check-input bg-black border-secondary m-0" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-white-50" for="rememberMe">Recordarme</label>
                            </div>

                            <button type="submit" class="btn btn-success w-100 py-2 mb-3 text-white fw-bold shadow-sm"
                                    style="transition: all 0.3s ease;">Entrar</button>
                        </form>

                        <div class="text-center small">
                            <a href="recover.html" class="text-white-50 text-decoration-none d-block mb-2 p-2 link-light">¿Olvidaste tu contraseña?</a>
                            <span class="text-white-50">¿No tienes cuenta?</span> 
                            <a href="record.html" class="text-success text-decoration-none fw-bold p-2 link-success">Regístrate</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
