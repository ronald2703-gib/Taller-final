<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aves Hermosas de Colombia</title>
    <link rel="shortcut icon" href="../assets/img/icone-twitter-verte.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="text-light-emphasis d-flex align-items-center vh-100 " 
      style="background-image: url('../assets/img/christina-victoria-craft-gv851Ya4l_Y-unsplash.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="text-center mb-4">
                    <a href="../index.html" class="text-decoration-none text-white fs-3 fw-bold">
                       <i class="bi bi-twitter text-success bt p-1 t  rounded bg-gradient " ></i> Alas de Colombia
                    </a>
                </div>
                <div class="card bg-dark border-secondary shadow">
                    <div class=" p-4 p-md-4">
                        <h2 class="card-title text-center text-white fw-bold fs-4 mb-4">Registro a la Plataforma</h2>
                        
                        <form action="login.html" method="GET">
                          
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label text-white-50 small fw-bold">Nombre</label>
                                    <input type="text" class="form-control bg-black text-white border-secondary" placeholder="Ej. Carlos" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-white-50 small fw-bold">Apellidos</label>
                                    <input type="text" class="form-control bg-black text-white border-secondary" placeholder="Ej. Restrepo" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label text-white-50 small fw-bold">Correo Electrónico</label>
                                    <input type="email" class="form-control bg-black text-white border-secondary" placeholder="carlos@example.com" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-white-50 small fw-bold">Teléfono de Contacto</label>
                                    <input type="tel" class="form-control bg-black text-white border-secondary" placeholder="+57 300 000 0000" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 py-2 mb-3 text-white fw-bold">Crear Cuenta</button>
                        </form>

                        <div class="text-center small">
                            <span class="text-white-50">¿Ya eres miembro?</span> 
                            <a href="login.html" class="text-success text-decoration-none fw-bold p-2">Inicia Sesión</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
